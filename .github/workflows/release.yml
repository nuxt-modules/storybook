name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Remove default permissions of GITHUB_TOKEN for security
# https://docs.github.com/en/actions/using-jobs/assigning-permissions-to-jobs
permissions: {}

jobs:
  nightly:
    name: Nightly & PR release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'nuxt-modules' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Needed for the nightly release to calculate the version bump
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: latest
          registry-url: 'https://registry.npmjs.org/'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Prepare build environment
        run: pnpm dev:prepare

      - name: Build
        run: pnpm build

      - name: 📦 Release pkg.pr.new
        if: ${{ github.event_name == 'pull_request' }}
        run: pnpm pkg-pr-new publish './packages/*'

      - name: Nightly release
        if: |
          github.event_name == 'push' &&
          !contains(github.event.head_commit.message, '[skip-release]') &&
          !startsWith(github.event.head_commit.message, 'docs')
        run: pnpm nightly-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}

  release:
    name: Release
    concurrency:
      group: release
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' && github.repository_owner == 'nuxt-modules' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org/'
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install

      - name: Publish packages
        run: pnpm publish --recursive --access public --no-git-checks --provenance --tag latest

      - name: Create GitHub Release
        run: pnpm release-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
